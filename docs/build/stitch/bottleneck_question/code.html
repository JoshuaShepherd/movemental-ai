<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "on-secondary": "#ffffff",
                  "inverse-primary": "#b4c5ff",
                  "surface-container-high": "#e6e8ea",
                  "secondary-container": "#d6e1e7",
                  "surface-container": "#eceef0",
                  "primary-container": "#0053db",
                  "inverse-on-surface": "#eff1f3",
                  "surface": "#f7f9fb",
                  "on-surface-variant": "#434655",
                  "surface-container-lowest": "#ffffff",
                  "on-tertiary-fixed-variant": "#3f4851",
                  "tertiary-fixed": "#dbe3ef",
                  "secondary": "#556065",
                  "surface-bright": "#f7f9fb",
                  "secondary-fixed": "#d9e4ea",
                  "outline-variant": "#c3c6d7",
                  "on-error-container": "#93000a",
                  "surface-container-low": "#f2f4f6",
                  "on-primary-fixed-variant": "#003ea8",
                  "primary-fixed-dim": "#b4c5ff",
                  "on-primary-container": "#ced8ff",
                  "on-secondary-fixed-variant": "#3e484d",
                  "on-surface": "#191c1e",
                  "error": "#ba1a1a",
                  "surface-tint": "#0053db",
                  "on-tertiary-container": "#d1d9e4",
                  "surface-container-highest": "#e0e3e5",
                  "on-tertiary-fixed": "#141c24",
                  "on-secondary-fixed": "#131d21",
                  "on-tertiary": "#ffffff",
                  "on-error": "#ffffff",
                  "surface-variant": "#e0e3e5",
                  "tertiary": "#3f4751",
                  "on-secondary-container": "#596469",
                  "tertiary-fixed-dim": "#bfc7d2",
                  "primary-fixed": "#dbe1ff",
                  "on-primary-fixed": "#00174b",
                  "primary": "#003ea8",
                  "surface-dim": "#d8dadc",
                  "on-background": "#191c1e",
                  "background": "#f7f9fb",
                  "tertiary-container": "#575f69",
                  "secondary-fixed-dim": "#bdc8ce",
                  "inverse-surface": "#2d3133",
                  "outline": "#737686",
                  "error-container": "#ffdad6",
                  "on-primary": "#ffffff"
          },
          "borderRadius": {
                  "DEFAULT": "0.375rem",
                  "lg": "0.25rem",
                  "xl": "0.5rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Inter"],
                  "body": ["Inter"],
                  "label": ["Inter"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .premium-gradient {
      background: linear-gradient(135deg, #003ea8 0%, #0053db 100%);
    }
    .ambient-shadow {
      box-shadow: 0 12px 40px rgba(42, 52, 57, 0.06);
    }
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Shell -->
<header class="bg-[#f7f9fb]/80 dark:bg-[#101820]/80 backdrop-blur-xl fixed top-0 w-full z-50">
<div class="flex justify-between items-center px-8 py-6 max-w-[1200px] mx-auto w-full">
<div class="text-xl font-semibold tracking-tighter text-[#2a3439] dark:text-[#f7f9fb] font-inter tracking-tight">
        Movemental
      </div>
<div class="flex items-center gap-6">
<button class="text-[#2a3439]/60 dark:text-[#f7f9fb]/60 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
</div>
</header>
<main class="min-h-screen pt-32 pb-24 flex flex-col items-center">
<!-- Content Rail -->
<div class="w-full max-w-[1200px] px-8 flex flex-col items-center">
<!-- Stepper / Context -->
<div class="w-full max-w-2xl mb-16 flex items-center justify-center gap-2">
<div class="h-1 w-8 rounded-full bg-primary-container"></div>
<div class="h-1 w-8 rounded-full bg-primary-container"></div>
<div class="h-1 w-8 rounded-full bg-primary-container"></div>
<div class="h-1 w-8 rounded-full bg-primary-container"></div>
<div class="h-1 w-8 rounded-full bg-surface-container-high"></div>
</div>
<div class="w-full max-w-2xl text-center space-y-4 mb-12">
<span class="uppercase tracking-[0.05em] font-bold text-[10px] text-primary block">
          REFLECTIVE ASSESSMENT
        </span>
<h1 class="text-4xl md:text-5xl font-semibold tracking-[-0.02em] leading-[1.1] text-on-surface">
          What feels like the biggest bottleneck right now?
        </h1>
<p class="text-lg text-on-surface-variant font-normal leading-[1.75] max-w-lg mx-auto">
          Use your own words if helpful. This insight helps us tailor your focus areas.
        </p>
</div>
<!-- Large Elegant Text Area Section -->
<div class="w-full max-w-3xl">
<div class="bg-surface-container-lowest ambient-shadow rounded-xl p-8 md:p-12 transition-all duration-300">
<div class="relative group">
<textarea class="w-full bg-surface-container-low border-none rounded-lg p-6 text-xl text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-lowest transition-all duration-300 outline-none resize-none" placeholder="Start typing your thoughts here..." rows="6"></textarea>
<div class="absolute bottom-4 right-4 flex items-center gap-2 pointer-events-none">
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40">
                Optional
              </span>
</div>
</div>
</div>
<!-- Action Section -->
<div class="mt-16 flex flex-col md:flex-row items-center justify-between gap-8">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors text-sm font-medium">
<span class="material-symbols-outlined text-base" data-icon="arrow_back">arrow_back</span>
            Previous Step
          </button>
<div class="flex items-center gap-4">
<button class="px-8 py-4 bg-surface-container-high text-on-surface font-medium rounded-[0.375rem] hover:bg-surface-container-highest transition-colors">
              Skip for now
            </button>
<button class="px-10 py-4 premium-gradient text-on-primary font-medium rounded-[0.375rem] shadow-lg shadow-primary/20 hover:opacity-90 transition-opacity">
              Continue
            </button>
</div>
</div>
</div>
</div>
<!-- Background Decoration (Asymmetric Bleed) -->
<div class="fixed top-1/4 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-1/4 -right-20 w-96 h-96 bg-primary-container/5 rounded-full blur-[120px] -z-10"></div>
</main>
<!-- Footer Shell -->
<footer class="bg-[#eceef0] dark:bg-[#101820] w-full mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-12 py-16 w-full max-w-[1200px] mx-auto font-inter text-sm leading-[1.75]">
<div class="text-[#2a3439]/50 dark:text-[#f7f9fb]/50 mb-8 md:mb-0">
        © 2024 Movemental. All rights reserved.
      </div>
<div class="flex flex-wrap justify-center gap-8">
<a class="text-[#2a3439]/50 dark:text-[#f7f9fb]/50 hover:text-[#003ea8] transition-colors" href="#">Privacy Policy</a>
<a class="text-[#2a3439]/50 dark:text-[#f7f9fb]/50 hover:text-[#003ea8] transition-colors" href="#">Terms of Service</a>
<a class="text-[#2a3439]/50 dark:text-[#f7f9fb]/50 hover:text-[#003ea8] transition-colors" href="#">Institutional Support</a>
</div>
</div>
</footer>
</body></html>
