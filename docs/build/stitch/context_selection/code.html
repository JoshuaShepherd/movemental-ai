<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: #191c1e;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #003ea8 0%, #0053db 100%);
        }
        .ambient-card-shadow {
            box-shadow: 0 12px 40px rgba(42, 52, 57, 0.06);
        }

<body class="bg-surface min-h-screen flex flex-col overflow-x-hidden">
<!-- TopNavBar -->
<header class="fixed top-0 w-full z-50 bg-[#f7f9fb]/80 dark:bg-[#101820]/80 backdrop-blur-xl">
<nav class="flex justify-between items-center px-8 py-6 max-w-[1200px] mx-auto w-full">
<div class="text-xl font-semibold tracking-tighter text-[#2a3439] dark:text-[#f7f9fb] font-inter tracking-tight">
                Movemental
            </div>
<div class="flex items-center gap-6">
<button class="text-[#2a3439]/60 dark:text-[#f7f9fb]/60 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
</nav>
</header>
<!-- Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center pt-24 pb-16 px-6">
<div class="w-full max-w-[800px] mx-auto">
<!-- Context Header -->
<div class="text-center mb-16">
<span class="text-[10px] font-bold tracking-[0.05em] text-primary uppercase mb-4 block">Section 01 — Background</span>
<h1 class="text-[32px] md:text-[48px] font-semibold text-[#2a3439] tracking-tight leading-[1.1] mb-6">
                    Which best describes your context?
                </h1>
<p class="text-secondary body-lg max-w-[500px] mx-auto leading-[1.75]">
                    Understanding your current role helps us tailor the movement strategy and institutional resources to your specific environment.
                </p>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Option 1 -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest ambient-card-shadow rounded-[0.375rem] border border-transparent hover:border-primary/10 transition-all text-left">
<div class="mb-6 w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<h3 class="text-lg font-medium text-[#2a3439] mb-2 leading-tight">Individual movement leader / author / teacher</h3>
<p class="text-sm text-secondary leading-[1.6]">Focused on personal thought leadership and independent instructional paths.</p>
</button>
<!-- Option 2 -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest ambient-card-shadow rounded-[0.375rem] border border-transparent hover:border-primary/10 transition-all text-left">
<div class="mb-6 w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined" data-icon="church">church</span>
</div>
<h3 class="text-lg font-medium text-[#2a3439] mb-2 leading-tight">Church or ministry</h3>
<p class="text-sm text-secondary leading-[1.6]">Rooted in faith-based communities and spiritual formation frameworks.</p>
</button>
<!-- Option 3 -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest ambient-card-shadow rounded-[0.375rem] border border-transparent hover:border-primary/10 transition-all text-left">
<div class="mb-6 w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined" data-icon="volunteer_activism">volunteer_activism</span>
</div>
<h3 class="text-lg font-medium text-[#2a3439] mb-2 leading-tight">Nonprofit or mission-driven organization</h3>
<p class="text-sm text-secondary leading-[1.6]">Impact-oriented structures addressing systemic social or cultural needs.</p>
</button>
<!-- Option 4 -->
<button class="group relative flex flex-col items-start p-8 bg-surface-container-lowest ambient-card-shadow rounded-[0.375rem] border border-transparent hover:border-primary/10 transition-all text-left">
<div class="mb-6 w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined" data-icon="corporate_fare">corporate_fare</span>
</div>
<h3 class="text-lg font-medium text-[#2a3439] mb-2 leading-tight">Institution / network / other</h3>
<p class="text-sm text-secondary leading-[1.6]">Scalable architectures, educational bodies, or collaborative networks.</p>
</button>
</div>
<!-- Navigation Actions -->
<div class="mt-16 flex flex-col items-center gap-6">
<button class="signature-gradient text-on-primary px-10 py-4 rounded-[0.375rem] font-medium tracking-tight hover:opacity-90 transition-all flex items-center gap-2 group">
                    Continue to Assessment
                    <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="text-secondary text-sm font-medium hover:text-primary transition-colors">
                    Skip for now
                </button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full mt-auto bg-[#eceef0] dark:bg-[#101820]">
<div class="flex flex-col md:flex-row justify-between items-center px-12 py-16 w-full max-w-[1200px] mx-auto font-inter text-sm leading-[1.75]">
<div class="text-[#2a3439]/50 dark:text-[#f7f9fb]/50 mb-8 md:mb-0">
                © 2024 Movemental. All rights reserved.
            </div>
<div class="flex flex-wrap justify-center gap-8">
<a class="text-[#2a3439]/50 dark:text-[#f7f9fb]/50 hover:text-[#003ea8] transition-colors" href="#">Privacy Policy</a>
<a class="text-[#2a3439]/50 dark:text-[#f7f9fb]/50 hover:text-[#003ea8] transition-colors" href="#">Terms of Service</a>
<a class="text-[#2a3439]/50 dark:text-[#f7f9fb]/50 hover:text-[#003ea8] transition-colors" href="#">Institutional Support</a>
</div>
</div>
</footer>
