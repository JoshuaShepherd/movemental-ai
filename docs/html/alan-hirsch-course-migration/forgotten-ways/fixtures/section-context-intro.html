<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context discovery — Forgotten Ways fixture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../site-templates/site-theme.css" />
    <link rel="stylesheet" href="../../_shared/forgotten-ways-shell.css" />
  </head>
  <body class="fw-migration">
    <header class="fw-topbar"><div class="fw-topbar__inner"><a href="../index.html" class="fw-topbar__brand">The Forgotten Ways<small>Fixture · context_discovery</small></a></div></header>
    <main class="fw-learn__content" style="max-width: var(--container-max); margin: 0 auto;">
      <article class="fw-lesson">
        <div class="fw-lesson__meta">Week 1 · <span class="fw-lesson__type">Context Discovery</span></div>
        <h1 class="fw-lesson__title">Name your context before you hear the content.</h1>
        <p class="fw-lesson__description">The course will speak differently to a suburban church plant than to an established urban parish. Locate yourself before the concept does.</p>

        <form style="display: grid; gap: 1rem;">
          <div class="fw-form__group">
            <label class="fw-form__label" for="ctx-role">Your current role</label>
            <input id="ctx-role" class="fw-form__input" type="text" placeholder="e.g. Associate pastor, church planter, lay leader" />
          </div>
          <div class="fw-form__group">
            <label class="fw-form__label" for="ctx-where">Where you serve</label>
            <input id="ctx-where" class="fw-form__input" type="text" placeholder="Neighborhood, city, or region" />
          </div>
          <div class="fw-form__group">
            <label class="fw-form__label" for="ctx-body">The community's current posture</label>
            <textarea id="ctx-body" class="fw-form__textarea" placeholder="Describe what your community is currently shaped around: building, brand, cause, compassion, calling…"></textarea>
          </div>
          <div class="fw-form__group">
            <label class="fw-form__label" for="ctx-hope">What you hope to carry home</label>
            <textarea id="ctx-hope" class="fw-form__textarea" placeholder="Not a goal — a listening posture."></textarea>
          </div>
          <button class="btn btn-primary" type="button">Save context to journal</button>
        </form>

        <div class="fw-lesson-footer">
          <a href="#" class="fw-lesson-footer__btn">Previous</a>
          <div class="fw-lesson-footer__center"><button class="fw-lesson-footer__btn fw-lesson-footer__btn--primary" type="button">Mark Complete</button></div>
          <a href="#" class="fw-lesson-footer__btn" style="justify-content: flex-end;">Next</a>
        </div>
      </article>
    </main>
  </body>
</html>
