<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unable to load — Forgotten Ways learn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../site-templates/site-theme.css" />
    <link rel="stylesheet" href="../_shared/forgotten-ways-shell.css" />
  </head>
  <body class="fw-migration">
    <header class="fw-topbar">
      <div class="fw-topbar__inner">
        <a href="./index.html" class="fw-topbar__brand">The Forgotten Ways<small>Error loading</small></a>
      </div>
    </header>
    <main style="padding: clamp(3rem, 8vw, 6rem) 1rem;">
      <div class="fw-empty" role="alert" style="max-width: 36rem;">
        <div class="fw-empty__icon" aria-hidden="true">
          <svg class="fw-icon fw-icon--xl" viewBox="0 0 24 24" fill="none" stroke="var(--destructive)" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <h2 class="fw-empty__title">We couldn't load this lesson.</h2>
        <p class="fw-empty__desc">Something went wrong between your browser and the course server. Check your connection and try again, or go back to the course overview.</p>
        <div class="fw-row" style="justify-content: center;">
          <button type="button" class="btn btn-primary" onclick="window.location.reload()">Try again</button>
          <a href="./index.html" class="btn btn-ghost">Back to course</a>
        </div>
      </div>
    </main>
  </body>
</html>
