<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Master components — GSAP 01 · Timeline + stagger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    />
    <link rel="stylesheet" href="./css/core.css" />
    <link rel="stylesheet" href="./css/gsap-demos.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="nav" data-nav>
      <div class="nav__inner">
        <a class="brand" href="./index.html">
          <span class="brand__mark" aria-hidden="true"></span>
          Movemental
        </a>
        <nav class="nav__links" aria-label="Primary">
          <ul>
            <li><a href="./index.html">Components</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main" class="demo-page gsap-page">
      <div class="container">
        <p class="label reveal"><span class="label__dot" aria-hidden="true"></span>GSAP 01</p>
        <h1 class="section-title reveal" style="--d: 0.06s">Timeline + <em>stagger</em></h1>
        <p class="demo-kicker reveal" style="--d: 0.1s">
          A single <code style="font-family: var(--font-mono); font-size: 0.88em">gsap.timeline()</code>
          orchestrates label order, then child boxes inherit a stagger — no ScrollTrigger, ideal for
          hero intros and dialog mount choreography.
        </p>

        <div class="gsap-stage reveal" style="--d: 0.14s">
          <div class="gsap-row" id="staggerRow" aria-live="polite">
            <div class="gsap-box"></div>
            <div class="gsap-box gsap-box--alt"></div>
            <div class="gsap-box"></div>
            <div class="gsap-box gsap-box--alt"></div>
            <div class="gsap-box"></div>
            <div class="gsap-box gsap-box--alt"></div>
          </div>
        </div>
      </div>

      <footer class="site-foot">
        <div class="site-foot__inner">
          <span>GSAP 01 · timeline + stagger</span>
          <a href="./index.html">Index</a>
        </div>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="./js/core.js" defer></script>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var boxes = gsap.utils.toArray("#staggerRow .gsap-box");
        gsap.set(boxes, { opacity: 0, y: 18, scale: 0.92 });
        if (reduced) {
          gsap.set(boxes, { opacity: 1, y: 0, scale: 1 });
          return;
        }
        var tl = gsap.timeline({ defaults: { ease: "power3.out" } });
        tl.addLabel("intro")
          .to(boxes, { opacity: 1, y: 0, scale: 1, duration: 0.55, stagger: 0.08 }, "intro")
          .to(boxes, { y: -4, duration: 0.35, ease: "power2.inOut", stagger: { each: 0.05, from: "center" } }, "+=0.15")
          .to(boxes, { y: 0, duration: 0.4, ease: "power2.out", stagger: { each: 0.05, from: "center" } }, "-=0.2");
      });
    </script>
  </body>
</html>
