<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Master components — Viz 01 · Stage spine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    />
    <link rel="stylesheet" href="./css/core.css" />
    <link rel="stylesheet" href="./css/viz-demo.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="nav" data-nav>
      <div class="nav__inner">
        <a class="brand" href="./index.html">
          <span class="brand__mark" aria-hidden="true"></span>
          Movemental
        </a>
        <nav class="nav__links" aria-label="Primary">
          <ul>
            <li><a href="./index.html">Components</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main" class="demo-page viz-page">
      <div class="container">
        <div class="viz-head reveal">
          <p class="label"><span class="label__dot" aria-hidden="true"></span>Viz 01</p>
          <h1 class="section-title">Stage spine</h1>
          <p class="demo-kicker">
            Horizontal progression with monochrome <code style="font-family: var(--font-mono); font-size: 0.88em">currentColor</code>
            strokes and numbered nodes — mirrors the six-stage narrative without importing a second
            palette.
          </p>
        </div>

        <figure class="viz-panel reveal" style="--d: 0.08s">
          <figcaption class="viz-panel__cap">Six-stage spine (static SVG)</figcaption>
          <svg
            class="viz-svg"
            viewBox="0 0 920 200"
            role="img"
            aria-labelledby="spine-title spine-desc"
            focusable="false"
          >
            <title id="spine-title">Fragmentation through movement</title>
            <desc id="spine-desc">
              Six nodes connected by a horizontal path from fragmentation to movement.
            </desc>
            <line
              x1="40"
              y1="100"
              x2="880"
              y2="100"
              stroke="currentColor"
              stroke-width="1.5"
              opacity="0.35"
            />
            <g font-family="ui-monospace, monospace" font-size="11" fill="currentColor" opacity="0.55">
              <text x="40" y="130" text-anchor="middle">01</text>
              <text x="208" y="130" text-anchor="middle">02</text>
              <text x="376" y="130" text-anchor="middle">03</text>
              <text x="544" y="130" text-anchor="middle">04</text>
              <text x="712" y="130" text-anchor="middle">05</text>
              <text x="880" y="130" text-anchor="middle">06</text>
            </g>
            <g stroke="currentColor" fill="none" stroke-width="1.2">
              <circle cx="40" cy="100" r="8" fill="var(--surface)" />
              <circle cx="208" cy="100" r="8" fill="var(--surface)" />
              <circle cx="376" cy="100" r="8" fill="var(--surface)" />
              <circle cx="544" cy="100" r="8" fill="var(--surface)" />
              <circle cx="712" cy="100" r="8" fill="var(--surface)" />
              <circle cx="880" cy="100" r="10" fill="currentColor" opacity="0.9" />
            </g>
            <g font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="currentColor">
              <text x="40" y="78" text-anchor="middle">Fragmentation</text>
              <text x="208" y="78" text-anchor="middle">Isolation</text>
              <text x="376" y="78" text-anchor="middle">Integration</text>
              <text x="544" y="78" text-anchor="middle">Activation</text>
              <text x="712" y="78" text-anchor="middle">Formation</text>
              <text x="880" y="78" text-anchor="middle">Movement</text>
            </g>
          </svg>
        </figure>
      </div>

      <footer class="site-foot">
        <div class="site-foot__inner">
          <span>Viz 01 · stage spine</span>
          <a href="./index.html">Index</a>
        </div>
      </footer>
    </main>
    <script src="./js/core.js" defer></script>
  </body>
</html>
