<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Master components — Viz 03 · Flow curves</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    />
    <link rel="stylesheet" href="./css/core.css" />
    <link rel="stylesheet" href="./css/viz-demo.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="nav" data-nav>
      <div class="nav__inner">
        <a class="brand" href="./index.html">
          <span class="brand__mark" aria-hidden="true"></span>
          Movemental
        </a>
        <nav class="nav__links" aria-label="Primary">
          <ul>
            <li><a href="./index.html">Components</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main" class="demo-page viz-page">
      <div class="container">
        <div class="viz-head reveal">
          <p class="label"><span class="label__dot" aria-hidden="true"></span>Viz 03</p>
          <h1 class="section-title">Sankey-style <em>flow</em></h1>
          <p class="demo-kicker">
            Cubic Bézier paths with shared stroke caps — reads as editorial diagram, not dashboard
            chrome. Labels sit in sans; volumes implied by stroke weight.
          </p>
        </div>

        <figure class="viz-panel reveal" style="--d: 0.08s">
          <figcaption class="viz-panel__cap">Sources narrowing into a single operating lane</figcaption>
          <svg class="viz-svg" viewBox="0 0 800 260" role="img" aria-labelledby="flow-title flow-desc">
            <title id="flow-title">Content flow convergence</title>
            <desc id="flow-desc">Three upstream channels merge through a gate into one downstream channel.</desc>
            <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M40 60 C 200 60, 220 110, 360 120"
                stroke-width="2.5"
                opacity="0.45"
              />
              <path
                d="M40 130 C 220 130, 240 125, 360 124"
                stroke-width="4"
                opacity="0.55"
              />
              <path
                d="M40 200 C 200 200, 230 150, 360 128"
                stroke-width="2.5"
                opacity="0.45"
              />
              <path
                d="M360 124 C 480 128, 500 128, 760 130"
                stroke-width="5"
                opacity="0.65"
              />
            </g>
            <g font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="currentColor">
              <text x="40" y="52">Books</text>
              <text x="40" y="122">Talks</text>
              <text x="40" y="212">Social</text>
              <text x="620" y="118">Shared layer</text>
            </g>
            <rect
              x="328"
              y="108"
              width="64"
              height="36"
              rx="8"
              fill="var(--surface)"
              stroke="currentColor"
              stroke-width="1"
              opacity="0.95"
            />
            <text
              x="360"
              y="130"
              text-anchor="middle"
              font-family="var(--font-mono), ui-monospace, monospace"
              font-size="11"
              fill="currentColor"
              opacity="0.65"
            >
              GATE
            </text>
          </svg>
        </figure>
      </div>

      <footer class="site-foot">
        <div class="site-foot__inner">
          <span>Viz 03 · flow curves</span>
          <a href="./index.html">Index</a>
        </div>
      </footer>
    </main>
    <script src="./js/core.js" defer></script>
  </body>
</html>
