<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Master components — Viz 04 · Hub network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    />
    <link rel="stylesheet" href="./css/core.css" />
    <link rel="stylesheet" href="./css/viz-demo.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="nav" data-nav>
      <div class="nav__inner">
        <a class="brand" href="./index.html">
          <span class="brand__mark" aria-hidden="true"></span>
          Movemental
        </a>
        <nav class="nav__links" aria-label="Primary">
          <ul>
            <li><a href="./index.html">Components</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main" class="demo-page viz-page">
      <div class="container">
        <div class="viz-head reveal">
          <p class="label"><span class="label__dot" aria-hidden="true"></span>Viz 04</p>
          <h1 class="section-title">Hub network</h1>
          <p class="demo-kicker">
            Radial edges with a single weighted hub — useful for “scenius” / credibility maps where one
            institution holds multiple weak ties open.
          </p>
        </div>

        <figure class="viz-panel reveal" style="--d: 0.08s">
          <figcaption class="viz-panel__cap">Nodes at fixed polar positions (static SVG)</figcaption>
          <svg class="viz-svg" viewBox="0 0 520 420" role="img" aria-labelledby="hub-title hub-desc">
            <title id="hub-title">Credibility hub network</title>
            <desc id="hub-desc">One central hub connected to eight outer nodes by straight lines.</desc>
            <g stroke="currentColor" stroke-width="1.2" opacity="0.35">
              <line x1="260" y1="210" x2="80" y2="70" />
              <line x1="260" y1="210" x2="440" y2="70" />
              <line x1="260" y1="210" x2="500" y2="210" />
              <line x1="260" y1="210" x2="440" y2="350" />
              <line x1="260" y1="210" x2="260" y2="390" />
              <line x1="260" y1="210" x2="80" y2="350" />
              <line x1="260" y1="210" x2="20" y2="210" />
              <line x1="260" y1="210" x2="120" y2="140" />
            </g>
            <g fill="currentColor">
              <circle cx="260" cy="210" r="14" opacity="0.9" />
              <circle cx="80" cy="70" r="6" opacity="0.55" />
              <circle cx="440" cy="70" r="6" opacity="0.55" />
              <circle cx="500" cy="210" r="6" opacity="0.55" />
              <circle cx="440" cy="350" r="6" opacity="0.55" />
              <circle cx="260" cy="390" r="6" opacity="0.55" />
              <circle cx="80" cy="350" r="6" opacity="0.55" />
              <circle cx="20" cy="210" r="6" opacity="0.55" />
              <circle cx="120" cy="140" r="6" opacity="0.55" />
            </g>
            <g
              font-family="Inter, system-ui, sans-serif"
              font-size="11"
              font-weight="500"
              fill="currentColor"
              opacity="0.55"
              text-anchor="middle"
            >
              <text x="260" y="238">Hub</text>
              <text x="80" y="58">Partner</text>
              <text x="440" y="58">Lab</text>
              <text x="500" y="200">Media</text>
              <text x="440" y="372">Field</text>
              <text x="260" y="412">Cohort</text>
              <text x="80" y="372">Church</text>
              <text x="20" y="200">Archive</text>
              <text x="120" y="128">Faculty</text>
            </g>
          </svg>
        </figure>
      </div>

      <footer class="site-foot">
        <div class="site-foot__inner">
          <span>Viz 04 · hub network</span>
          <a href="./index.html">Index</a>
        </div>
      </footer>
    </main>
    <script src="./js/core.js" defer></script>
  </body>
</html>
