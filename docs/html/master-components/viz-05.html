<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Master components — Viz 05 · Spark column</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    />
    <link rel="stylesheet" href="./css/core.css" />
    <link rel="stylesheet" href="./css/viz-demo.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="nav" data-nav>
      <div class="nav__inner">
        <a class="brand" href="./index.html">
          <span class="brand__mark" aria-hidden="true"></span>
          Movemental
        </a>
        <nav class="nav__links" aria-label="Primary">
          <ul>
            <li><a href="./index.html">Components</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main" class="demo-page viz-page">
      <div class="container">
        <div class="viz-head reveal">
          <p class="label"><span class="label__dot" aria-hidden="true"></span>Viz 05</p>
          <h1 class="section-title">Engagement spark column</h1>
          <p class="demo-kicker">
            Twelve micro-bars with hover affordance — monochrome mix of ink into border tokens. Pairs
            with monospace metrics on case-study pages.
          </p>
        </div>

        <figure class="viz-panel reveal" style="--d: 0.08s">
          <figcaption class="viz-panel__cap">Weekly depth · walkthrough module (demo data)</figcaption>
          <div style="display: flex; flex-wrap: wrap; gap: 2rem; align-items: flex-end">
            <div class="viz-sparks" style="flex: 1 1 200px; max-width: 360px" aria-hidden="true">
              <span class="viz-sparks__bar" style="height: 22%"></span>
              <span class="viz-sparks__bar" style="height: 35%"></span>
              <span class="viz-sparks__bar" style="height: 48%"></span>
              <span class="viz-sparks__bar" style="height: 40%"></span>
              <span class="viz-sparks__bar" style="height: 62%"></span>
              <span class="viz-sparks__bar" style="height: 55%"></span>
              <span class="viz-sparks__bar" style="height: 70%"></span>
              <span class="viz-sparks__bar" style="height: 58%"></span>
              <span class="viz-sparks__bar" style="height: 44%"></span>
              <span class="viz-sparks__bar" style="height: 52%"></span>
              <span class="viz-sparks__bar" style="height: 78%"></span>
              <span class="viz-sparks__bar" style="height: 65%"></span>
            </div>
            <div style="font-family: var(--font-mono); font-size: 0.78rem; color: var(--ink-soft); line-height: 1.6">
              PEAK DEPTH<br />
              <span style="color: var(--ink); font-size: 1.4rem; font-weight: 500">78%</span><br />
              <span style="opacity: 0.85">WEEK 06 · MODULE 4</span>
            </div>
          </div>
        </figure>
      </div>

      <footer class="site-foot">
        <div class="site-foot__inner">
          <span>Viz 05 · spark column</span>
          <a href="./index.html">Index</a>
        </div>
      </footer>
    </main>
    <script src="./js/core.js" defer></script>
  </body>
</html>
