<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Build — feature switcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF6; --surface:#F6F3EC; --sheet:#FFFDF7;
    --ink:#1A1A1A; --ink-muted:#5C5651; --border:#E5DFD2;
    --ink-blue:#22409B; --hl:#EAFF3A; --dark:#0A0E1A;
    --serif:"Playfair Display",Georgia,serif;
    --sans:"Inter",system-ui,sans-serif;
    --mono:"IBM Plex Mono","Courier New",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:56px 28px 72px}

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-muted)}
  h2{font-family:var(--serif);font-weight:600;font-size:clamp(28px,4vw,40px);line-height:1.12;letter-spacing:-.015em;margin:.5rem 0 .4rem;max-width:20ch}
  .sub{font-size:17px;color:var(--ink-muted);max-width:46ch;margin:0}
  .u{position:relative;white-space:nowrap}
  .uline{position:absolute;left:0;right:0;bottom:-.14em;width:100%;height:.5em;overflow:visible}
  .stroke{fill:none;stroke:var(--ink-blue);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:.94;filter:url(#rough)}

  .aud{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:30px 0 24px}
  .aud .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-muted)}
  .aud button{font-family:var(--sans);font-size:14px;font-weight:500;color:var(--ink);background:transparent;border:1px solid var(--border);padding:7px 15px;cursor:pointer;border-radius:999px;transition:all .15s}
  .aud button:hover{border-color:var(--ink-blue);color:var(--ink-blue)}
  .aud button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .switch{display:grid;grid-template-columns:330px 1fr;gap:30px;align-items:start}

  /* capability tabs */
  .tabs{display:flex;flex-direction:column;border-top:1px solid var(--border)}
  .row{border-bottom:1px solid var(--border);border-left:2px solid transparent;transition:border-color .16s,background .16s}
  .row.on{border-left-color:var(--ink-blue);background:var(--sheet)}
  .row > .head{width:100%;text-align:left;background:transparent;border:none;padding:15px 16px 13px;cursor:pointer;font-family:var(--sans)}
  .row .t{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--ink)}
  .row.on .t{color:var(--ink-blue)}
  .row .tag{font-size:13px;color:var(--ink-muted);margin-top:2px}
  .detail{overflow:hidden;max-height:0;transition:max-height .3s ease}
  .row.on .detail{max-height:1200px}
  .detail-in{padding:2px 16px 16px}

  /* feature rows with dropdown descriptions */
  .feats{list-style:none;margin:0 0 12px;padding:0}
  .feat{border-bottom:1px solid var(--border)}
  .feat:last-child{border-bottom:none}
  .feat-head{width:100%;display:flex;align-items:center;gap:9px;background:transparent;border:none;padding:11px 0;cursor:pointer;text-align:left;font-family:var(--sans)}
  .feat-head .b{width:4px;height:4px;border-radius:50%;background:var(--border);flex:none}
  .feat-head .fn{flex:1;font-size:14.5px;color:var(--ink)}
  .feat-head .chev{font-size:11px;color:var(--ink-muted);transition:transform .2s}
  .feat.open .chev{transform:rotate(90deg)}
  .feat.agent .fn{color:var(--ink-blue);font-weight:500}
  .feat.agent .b{background:var(--ink-blue)}
  .feat-desc{overflow:hidden;max-height:0;transition:max-height .24s ease}
  .feat.open .feat-desc{max-height:170px}
  .feat-desc-in{padding:0 0 12px 13px}
  .feat-desc p{margin:0 0 7px;font-size:13.5px;color:var(--ink-muted);line-height:1.5}
  .subs{font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--ink-muted);line-height:1.7}

  .live{display:inline-block;font-size:13.5px;font-weight:600;color:var(--ink-blue);text-decoration:none;margin-top:4px}
  .live:hover{text-decoration:underline}

  /* device stage */
  .stage{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px 24px;display:flex;gap:20px;align-items:flex-end;justify-content:center;min-height:360px}
  .stagewrap{animation:fade .26s ease both}
  .desktop{flex:1;max-width:470px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--sheet);box-shadow:0 6px 22px #0000000f}
  .bar{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--paper)}
  .bar i{width:8px;height:8px;border-radius:50%;background:#d9d2c4;display:block}
  .url{flex:1;margin-left:7px;font-family:var(--mono);font-size:10.5px;color:var(--ink-muted);background:var(--sheet);border:1px solid var(--border);border-radius:5px;padding:3px 9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dbody{padding:16px;min-height:228px}
  .phone{flex:none;width:158px;border:7px solid var(--ink);border-radius:30px;background:var(--ink);box-shadow:0 8px 24px #0000001f}
  .pscreen{background:var(--paper);border-radius:23px;overflow:hidden;height:312px;display:flex;flex-direction:column}
  .notch{height:18px;display:flex;justify-content:center;align-items:flex-start}
  .notch::after{content:"";width:46px;height:5px;background:var(--ink);border-radius:99px;margin-top:6px}
  .phead{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);padding:2px 12px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
  .phead .av{width:7px;height:7px;border-radius:50%;background:var(--ink-blue)}
  .chat{flex:1;padding:11px;display:flex;flex-direction:column;gap:9px;overflow:hidden}
  .bub{font-size:11px;line-height:1.4;padding:8px 10px;border-radius:12px;max-width:88%}
  .bub.u{align-self:flex-end;background:var(--ink);color:var(--paper);border-bottom-right-radius:4px}
  .bub.a{align-self:flex-start;background:var(--surface);color:var(--ink);border:1px solid var(--border);border-bottom-left-radius:4px}
  .pinput{display:flex;align-items:center;gap:7px;margin:0 9px 11px;border:1px solid var(--border);border-radius:99px;padding:6px 8px 6px 12px;background:var(--sheet)}
  .pinput .ph{flex:1;font-size:10.5px;color:var(--ink-muted)}
  .pinput .go{width:18px;height:18px;border-radius:50%;background:var(--ink-blue)}

  /* wireframes */
  .wf-doctitle{font-family:var(--serif);font-size:17px;font-weight:500;margin-bottom:9px}
  .wf-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px}
  .wf-tabs span{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-muted);border:1px solid var(--border);padding:3px 8px;border-radius:4px}
  .wf-tabs span:first-child{border-color:var(--ink-blue);color:var(--ink-blue)}
  .wf-lines i{display:block;height:8px;background:var(--surface);border-radius:3px;margin:7px 0;width:100%}
  .wf-hero{font-family:var(--serif);font-size:16px;font-weight:500;padding:14px 13px;background:var(--surface);border-radius:7px;margin-bottom:11px}
  .wf-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .wf-card{font-size:11px;color:var(--ink-muted);border:1px solid var(--border);border-radius:7px;padding:22px 10px 10px;background:var(--paper);min-height:66px;display:flex;align-items:flex-end}
  .wf-course{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px dotted var(--border)}
  .wf-course>span{font-size:13px;flex:1}
  .wf-course .pbar{width:96px;height:6px;background:var(--surface);border-radius:99px;overflow:hidden}
  .wf-course .pbar b{display:block;height:100%;background:var(--ink-blue);opacity:.85}
  .wf-table{font-size:12.5px}
  .wf-tr{display:grid;grid-template-columns:1.6fr .9fr .9fr;gap:7px;padding:9px 3px;border-bottom:1px solid var(--border)}
  .wf-th{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted)}
  .wf-stage{color:var(--ink-blue);font-weight:500}

  .foot{font-size:13px;color:var(--ink-muted);font-style:italic;margin:22px 0 0;max-width:54ch}

  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media(max-width:820px){
    .switch{grid-template-columns:1fr}
    .stage{flex-wrap:wrap;justify-content:flex-start}
    .desktop{max-width:none;width:100%}
  }
  @media(max-width:460px){ .phone{display:none} }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="6" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="1.7" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<div class="wrap">
  <div class="eyebrow">The build</div>
  <h2>Then we build <span class="u">the tools<svg class="uline" viewBox="0 0 150 12" preserveAspectRatio="none"><path class="stroke" d="M3 8 C 45 3, 105 11, 147 5"/></svg></span> on top of it.</h2>
  <p class="sub">The working platform, on the desk and in your pocket. Pick a layer, open any piece.</p>

  <div class="aud">
    <span class="lbl">Showing the build for</span>
    <button data-aud="nonprofits" class="on">Non-profits</button>
    <button data-aud="churches">Churches</button>
    <button data-aud="institutions">Institutions</button>
  </div>

  <div class="switch">
    <div class="tabs" id="tabs"></div>
    <div id="stage"></div>
  </div>

  <p class="foot" id="foot"></p>
</div>

<script>
const ORDER = ['foundation','publishing','formation','relationships'];

// Foundation is the spine: identical in every platform. Four always-on categories.
const FOUNDATION_FEATS = [
  {n:'Your website', d:'A complete public site, editable by you: home, about, contact, newsletter signup, and site-wide search.',
    sub:'Home · About · Contact · Newsletter signup · Search'},
  {n:'Accounts & dashboard', d:'Sign-in, member accounts, a staff dashboard, and roles and permissions.',
    sub:'Sign-in & invites · Member accounts · Settings & roles · Staff dashboard'},
  {n:'AI Assistant', agent:1, d:'A public concierge, staff assistants, and cited search across everything you’ve made.',
    sub:'Public assistant · Staff assistants · Smart search'},
  {n:'Library', d:'Every report, document, and recording, imported, transcribed, and searchable in one place.',
    sub:'Import & transcribe · One search box · Public index'},
  {n:'Visibility & Trust', d:'Your people and claims as entities that Google and AI get right, with every claim sourced.',
    sub:'Search & AI visibility · Sources & citations · Real profiles · Network & endorsements'},
  {n:'Governance', d:'Your AI rules live and searchable, including your AI Safety Charter, with roles and analytics.',
    sub:'AI Handbook & Safety Charter · Roles & permissions · Analytics · Readiness check'}
];

const SHARED = {
  foundation:{title:'Foundation', tag:'The spine. Included in every platform.', wf:'foundation',
    wfData:{charterTitle:'AI Safety Charter', tabs:['Vision','Plans','Reality','Rules','Response']},
    phone:{q:'Can we use AI in donor messages?', a:'Yes for drafting. A human sends.'}, feats:FOUNDATION_FEATS},
  publishing:{title:'Publishing', tag:'Your public face, and the tools to run it.', wf:'publishing',
    phone:{q:'Make a newsletter blurb from our report.', a:'Drafted from your report. Source linked.'}},
  formation:{title:'Formation', tag:'How you form and teach people.', wf:'formation',
    phone:{q:'Where is this cohort stuck?', a:'Three learners stalled at Module 3.'}},
  relationships:{title:'Relationships', tag:'People, giving, and operations in one place.', wf:'relationships',
    phone:{q:'Draft a thank-you for a $5,000 gift.', a:'Draft ready. A human reviews and sends.'}}
};

const DATA = {
  nonprofits:{ demo:'https://nonprofits.movemental.ai',
    foundation:{path:'/app/handbook', agent:'Foundation agent'},
    publishing:{path:'/impact', agent:'Publishing agent',
      wfData:{hero:'Clean water reached 12 villages', cards:['Field report','Annual impact','From the director']},
      feats:[{n:'Stories', d:'Impact stories that show what you actually did.'},
             {n:'Articles', d:'Long-form writing: pillar pieces, clusters, essays.'},
             {n:'Programs', d:'Your offerings, described and discoverable.'},
             {n:'Newsletter & media', d:'Broadcasts and sequences, plus audio and video with transcripts.', sub:'Broadcasts · Sequences · Segments · Public archive'},
             {n:'Publishing agent', agent:1, d:'Drafts posts and reports from your verified corpus, always citable.'}]},
    formation:{path:'/learn', agent:'Formation agent',
      wfData:{courses:[['AI Safety Leadership',72],['Field Reporting',40],['Foundations',100]]},
      feats:[{n:'Pathways & courses', d:'Guided journeys and the real course player.'},
             {n:'Cohorts & community', d:'Run a group through together, with discussion and facilitation.'},
             {n:'Certificates & assessments', d:'Reflection, completion, and proof.'},
             {n:'Enroll & apply', d:'How people get in.'},
             {n:'Formation agent', agent:1, d:'A tutor grounded in your curriculum, not the open internet.'}]},
    relationships:{path:'/app/donors', agent:'Relationships agent',
      wfData:{col:'Donor', rows:[['Eleanor Vance','$5,000','Stewardship'],['Marcus Lee','$250','New'],['Ford Foundation','Grant','Reporting']]},
      feats:[{n:'Donor CRM', d:'One page per donor, with segments and full history.'},
             {n:'Stewardship pipelines', d:'Move someone from first gift to committed.'},
             {n:'Giving & campaigns', d:'Donations, recurring gifts, campaigns, pledges, receipts.'},
             {n:'Grants', d:'Pipeline, deadlines, and agent-drafted reports.'},
             {n:'Events & volunteers', d:'Registration, shifts, and hours.'},
             {n:'Relationships agent', agent:1, d:'Drafts donor and stewardship messages, with a human always sending.'}]} },

  churches:{ demo:'https://church.movemental.ai',
    foundation:{path:'/app/handbook', agent:'Foundation agent'},
    publishing:{path:'/sermons', agent:'Publishing agent',
      wfData:{hero:'This week: The Architecture of Grace', cards:['Sermon library','Watch & listen','From the pastor']},
      feats:[{n:'Ministry pages', d:'Editable pages for each ministry.'},
             {n:'Sermons & media', d:'Audio and video with transcripts, your teaching archive.'},
             {n:'Watch & listen', d:'The public media hub.'},
             {n:'Newsletter', d:'Broadcasts, sequences, a public archive.'},
             {n:'Publishing agent', agent:1, d:'Turns a sermon into a study, a devotional, and posts, all citable.'}]},
    formation:{path:'/courses', agent:'Formation agent',
      wfData:{courses:[['Discipleship Journey',60],['Foundations',100],['Membership',30]]},
      feats:[{n:'Discipleship pathways', d:'Guided next-steps journeys.'},
             {n:'Courses & classes', d:'The course player for classes and studies.'},
             {n:'Groups', d:'Find and join a group.'},
             {n:'Milestones', d:'Steps and celebrations along the way.'},
             {n:'Formation agent', agent:1, d:'A guide grounded in your church’s teaching.'}]},
    relationships:{path:'/giving', agent:'Relationships agent',
      wfData:{col:'Member', rows:[['Okafor household','—','Member'],['Sam Reyes','—','New here'],['Giving, June','$42,300','On track']]},
      feats:[{n:'Members & households', d:'Records, households, and attendance.'},
             {n:'Assimilation pipeline', d:'From first-time guest to belonging.'},
             {n:'Giving', d:'Recurring, pledges, campaigns, statements.'},
             {n:'Care & follow-up', d:'Pastoral care tracking, with data guardrails.'},
             {n:'Events & groups admin', d:'Registration and group management.'},
             {n:'Relationships agent', agent:1, d:'Drafts follow-up and care notes, a human always sends.'}]} },

  institutions:{ demo:'https://seminary.movemental.ai',
    foundation:{path:'/library', agent:'Foundation agent'},
    publishing:{path:'/scholarship', agent:'Publishing agent',
      wfData:{hero:'The Architecture of Grace, an essay', cards:['Faculty scholarship','Publications','Public lectures']},
      feats:[{n:'Scholarship', d:'Faculty work, cited, with provenance.'},
             {n:'Research & publications', d:'The publications index and reading pages.'},
             {n:'Public lectures', d:'The talks archive.'},
             {n:'Newsletter', d:'Broadcasts and a public archive.'},
             {n:'Publishing agent', agent:1, d:'Drafts from the scholarly corpus, every claim sourced.'}]},
    formation:{path:'/courses', agent:'Formation agent',
      wfData:{courses:[['MDiv core',55],['Reformation History',80],['Spiritual Formation',100]]},
      feats:[{n:'Programs & courses', d:'The catalog, the course player, credentials.'},
             {n:'Cohorts & admissions', d:'Cohort spaces and application management.'},
             {n:'Certificates & credits', d:'Completion, transcripts, continuing ed.'},
             {n:'Enroll & apply', d:'Admissions and enrollment.'},
             {n:'Formation agent', agent:1, d:'A tutor grounded in the course corpus.'}]},
    relationships:{path:'/advancement', agent:'Relationships agent',
      wfData:{col:'Student / Alumni', rows:[['Jane Mitchell','Alumna','Advancement'],['Cohort 2026','24','Enrolled'],['Excellence Fund','$1.2M','Campaign']]},
      feats:[{n:'Student records', d:'Records under academic-records guardrails.'},
             {n:'Advancement & alumni', d:'The alumni and advancement CRM.'},
             {n:'Giving & campaigns', d:'Funds, campaigns, pledges.'},
             {n:'Events & lectures', d:'Registration for events and lectures.'},
             {n:'Relationships agent', agent:1, d:'Drafts advancement and alumni comms, a human in the loop.'}]} }
};

const state = {aud:'nonprofits', cap:'foundation'};
function cap(){ return Object.assign({}, SHARED[state.cap], DATA[state.aud][state.cap]); }
function featsFor(k){ return SHARED[k].feats || DATA[state.aud][k].feats; }

function renderTabs(){
  const el = document.getElementById('tabs'); el.innerHTML='';
  ORDER.forEach(k=>{
    const s = SHARED[k];
    const on = k===state.cap;
    const feats = on ? featsFor(k) : [];
    const row = document.createElement('div');
    row.className = 'row' + (on?' on':'');
    const featHtml = feats.map((f,i)=>`
      <li class="feat" data-i="${i}">
        <button class="feat-head"><span class="b"></span><span class="fn">${f.n}</span><span class="chev">&rsaquo;</span></button>
        <div class="feat-desc"><div class="feat-desc-in"><p>${f.d}</p>${f.sub?`<div class="subs">${f.sub}</div>`:''}</div></div>
      </li>`).join('');
    row.innerHTML = `
      <button class="head"><div class="t">${s.title}</div><div class="tag">${s.tag}</div></button>
      <div class="detail"><div class="detail-in">
        ${on?`<ul class="feats">${featHtml}</ul>
        <a class="live" href="${DATA[state.aud].demo}${DATA[state.aud][k].path}" target="_blank" rel="noopener">Explore it live &rarr;</a>`:''}
      </div></div>`;
    row.querySelector('.head').onclick = ()=>{ state.cap=k; render(); };
    row.querySelectorAll('.feat').forEach(li=>{
      li.querySelector('.feat-head').onclick = ()=> li.classList.toggle('open');
    });
    el.appendChild(row);
  });
}

function wireframe(c){
  if(c.wf==='foundation') return `<div class="wf-doctitle">${c.wfData.charterTitle}</div>
    <div class="wf-tabs">${c.wfData.tabs.map(t=>`<span>${t}</span>`).join('')}</div>
    <div class="wf-lines"><i></i><i style="width:92%"></i><i style="width:80%"></i><i style="width:88%"></i></div>`;
  if(c.wf==='publishing') return `<div class="wf-hero">${c.wfData.hero}</div>
    <div class="wf-cards">${c.wfData.cards.map(x=>`<div class="wf-card">${x}</div>`).join('')}</div>`;
  if(c.wf==='formation') return `<div>${c.wfData.courses.map(([t,p])=>`<div class="wf-course"><span>${t}</span><div class="pbar"><b style="width:${p}%"></b></div></div>`).join('')}</div>`;
  if(c.wf==='relationships') return `<div class="wf-table"><div class="wf-tr wf-th"><span>${c.wfData.col}</span><span></span><span>Stage</span></div>
    ${c.wfData.rows.map(r=>`<div class="wf-tr"><span>${r[0]}</span><span>${r[1]}</span><span class="wf-stage">${r[2]}</span></div>`).join('')}</div>`;
  return '';
}

function render(){
  renderTabs();
  const c = cap();
  const url = DATA[state.aud].demo.replace('https://','') + c.path;
  document.getElementById('stage').innerHTML = `
    <div class="stagewrap">
      <div class="stage">
        <div class="desktop">
          <div class="bar"><i></i><i></i><i></i><span class="url">${url}</span></div>
          <div class="dbody">${wireframe(c)}</div>
        </div>
        <div class="phone"><div class="pscreen">
          <div class="notch"></div>
          <div class="phead"><span class="av"></span>${c.agent}</div>
          <div class="chat">
            <div class="bub u">${c.phone.q}</div>
            <div class="bub a">${c.phone.a}</div>
          </div>
          <div class="pinput"><span class="ph">Ask ${c.agent.split(' ')[0].toLowerCase()}</span><span class="go"></span></div>
        </div></div>
      </div>
    </div>`;
  document.getElementById('foot').textContent =
    `A seeded preview. Explore it live opens the real ${state.aud.replace(/s$/,'')} demo so you can click around.`;
}

document.querySelectorAll('.aud button').forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll('.aud button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); state.aud=b.dataset.aud; render(); };
});

render();
</script>
</body>
</html>
