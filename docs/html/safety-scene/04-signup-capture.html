<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Movemental — Start your charter (design mock-up)</title>
    <meta name="description" content="Funnel screen 4 — frictionless capture: email + magic link only." />
    <link rel="stylesheet" href="../home/styles.css" />
    <link rel="stylesheet" href="ink-band-content.css" />
  </head>
  <body class="ink-band-surface">
    <div class="room" id="room">
      <header class="mast">
        <div class="mastStart">
          <button type="button" class="logo" aria-label="Movemental — back to the start">
            <img class="logoMark" src="../../../public/images/brand/movemental-logo-transparent.h224.webp" alt="Movemental" width="411" height="224" />
          </button>
        </div>
        <p class="mastAudience" aria-label="Who we serve">Non-profits · Churches · Institutions</p>
        <div class="mastEnd" id="mast-auth">
          <div class="authCluster authCluster--out" id="auth-out">
            <a class="authIconBtn" href="/login" aria-label="Sign in" title="Sign in">
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            </a>
          </div>
          <div class="authCluster authCluster--in" id="auth-in" hidden>
            <button type="button" class="authIconBtn authMenuTrigger" id="auth-menu-trigger" aria-label="Account menu" aria-haspopup="true" aria-expanded="false" title="Account">
              <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <div class="authMenu" id="auth-menu" role="menu" hidden>
              <p class="authMenuLabel" id="auth-menu-label">Workspace</p>
              <ul class="authMenuList" id="auth-menu-list"></ul>
              <button type="button" class="authMenuSignOut" id="auth-sign-out" role="menuitem">Sign out</button>
            </div>
          </div>
        </div>
      </header>
      <section class="screen scroll screen--centered" id="screen" aria-label="Sign up">
        <div class="sheet settle sheet--capture" id="sheet">
          <div class="captureState" id="capture-state">
            <p class="eyebrow" id="eyebrow"></p>
            <p class="q" id="headline"></p>
            <p class="sub" id="reminder"></p>
            <form class="cap" id="capture-form">
              <div class="capCell">
                <div class="capField"><input type="email" name="email" id="email-input" autocomplete="email" required aria-label="Email address" /></div>
              </div>
              <button type="submit" class="capSubmit" id="submit-btn"></button>
            </form>
            <div class="trustNote" id="trust"></div>
          </div>
          <div class="confirmState" id="confirm-state" aria-live="polite">
            <p class="eyebrow" id="confirm-eyebrow"></p>
            <h2 class="confirmHeadline" id="confirm-headline"></h2>
            <p class="confirmBody" id="confirm-body"></p>
          </div>
        </div>
      </section>

      <div class="agentDock" id="agent-dock">
        <div class="dockBackdrop" id="dock-backdrop" hidden></div>
        <div class="handwritingStrip" aria-live="polite">
          <div class="handwritingInner"><div class="vline" id="voice-line">No more decisions here — just your email and a link.</div></div>
        </div>
        <div class="agentFloat" id="agent-float">
          <form class="agentCard" id="agent-card" role="region" aria-label="Agent conversation">
            <div class="cardHeader" id="card-header">
              <span class="cardTitle">Conversation</span>
              <button type="button" class="cardCollapse" id="card-collapse" aria-label="Collapse chat" title="Collapse chat">
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 11.25L9 6.75l4.5 4.5"/></svg>
              </button>
            </div>
            <div class="cardThread" id="card-thread"><div class="threadMsg threadMsg--agent"><p>No more decisions here — just your email and a link.</p></div></div>
            <form class="cardBody" id="composer-form">
              <label class="cardInput"><input type="text" name="message" id="composer-input" autocomplete="off" aria-label="Talk to Movemental" placeholder="Questions about access or your link…" /></label>
              <div class="cardToolbar">
                <div class="toolbarGroup">
                  <button type="button" class="toolBtn" aria-label="Add attachment">+</button>
                  <button type="button" class="toolBtn" aria-label="Slash commands">/</button>
                </div>
                <div class="toolbarGroup">
                  <button type="button" class="toolBtn expandToggle" id="expand-toggle" aria-label="Expand chat" aria-expanded="false" title="Expand chat">
                    <svg class="iconExpand" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                  </button>
                  <button type="submit" class="sendRound" aria-label="Send">
                    <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 12V4M8 4l-3.5 3.5M8 4l3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                </div>
              </div>
            </form>
            <button type="button" class="cardHandle" id="card-handle" aria-label="Expand drawer" aria-expanded="false"><span class="handleBar"></span></button>
          </form>
          <p class="dockLegend"><button type="button" class="replay" id="replay">↻ replay</button></p>
        </div>
      </div>
    </div>
    <svg class="ink" aria-hidden="true" width="0" height="0" style="position:absolute"><defs><filter id="marker" x="-15%" y="-70%" width="130%" height="240%"><feTurbulence type="fractalNoise" baseFrequency="0.018 0.11" numOctaves="2" seed="9" result="n" /><feDisplacementMap in="SourceGraphic" in2="n" scale="3.4" xChannelSelector="R" yChannelSelector="G" /></filter></defs></svg>
    <script src="shell.js"></script>
    <script>
const SIGNUP_STATE = {
  eyebrow: "One step",
  headline: "Start your Safety charter.",
  reminder: "We'll email you a magic link to pick up where you are — no password, no account setup.",
  email: { placeholder: "you@yourorganization.org", submitLabel: "Email me a link" },
  trust: { next: "Check your inbox. The link opens your dashboard draft — same five Guidebook layers, saved to your organization.", data: "Your data is yours. We don't train on your charter text." },
  confirm: { eyebrow: "Link sent", headline: "Check your inbox.", body: "We sent a sign-in link. It expires in one hour. If it doesn't arrive, check spam or request another from this page." },
  dock: { voiceLine: "No more decisions here — just your email and a link.", voiceLineConfirm: "You're in — open the link when it lands.", composerPlaceholder: "Questions about access or your link…" },
};
const $ = (s) => document.querySelector(s);
function render() {
  $("#eyebrow").textContent = SIGNUP_STATE.eyebrow;
  $("#headline").textContent = SIGNUP_STATE.headline;
  $("#reminder").textContent = SIGNUP_STATE.reminder;
  $("#email-input").placeholder = SIGNUP_STATE.email.placeholder;
  $("#submit-btn").textContent = SIGNUP_STATE.email.submitLabel;
  $("#trust").innerHTML = "<p>" + SIGNUP_STATE.trust.next + "</p><p>" + SIGNUP_STATE.trust.data + "</p>";
  $("#confirm-eyebrow").textContent = SIGNUP_STATE.confirm.eyebrow;
  $("#confirm-headline").textContent = SIGNUP_STATE.confirm.headline;
  $("#confirm-body").textContent = SIGNUP_STATE.confirm.body;
  $("#voice-line").textContent = SIGNUP_STATE.dock.voiceLine;
  $("#composer-input").placeholder = SIGNUP_STATE.dock.composerPlaceholder;
}
function resetCapture() {
  $("#capture-state").classList.remove("is-hidden");
  $("#confirm-state").classList.remove("is-visible");
  $("#email-input").value = "";
  $("#voice-line").textContent = SIGNUP_STATE.dock.voiceLine;
}
window.__safetySceneReplay = resetCapture;
$("#capture-form").addEventListener("submit", (e) => {
  e.preventDefault();
  const input = $("#email-input");
  if (!input.value.trim() || !input.validity.valid) { input.focus(); return; }
  $("#capture-state").classList.add("is-hidden");
  $("#confirm-state").classList.add("is-visible");
  $("#voice-line").textContent = SIGNUP_STATE.dock.voiceLineConfirm;
});
render();
</script>
  </body>
</html>
