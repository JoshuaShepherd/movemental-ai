<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movemental Reader — internal library</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Internal review reader for the Movemental manuscript and article drafts." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/reader.css" />
  <!-- No-flash theme boot: apply stored theme before first paint to avoid flicker -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("movemental-reader:theme") || "system";
        var dark = t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <!-- Top app nav — persistent across library + reader views -->
  <header class="app-nav" role="banner">
    <div class="app-nav__inner">
      <a href="#/" id="back-home" class="app-brand" aria-label="Back to library">
        <span class="app-brand__mark">M</span>
        <span>Movemental Reader</span>
        <span class="app-brand__sub">Internal</span>
      </a>

      <button id="sidebar-toggle" class="icon-btn sidebar-toggle" aria-label="Toggle chapter list">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div id="app-crumb" class="app-nav__crumb"><strong>Library</strong></div>

      <div class="reader-toolbar" role="group" aria-label="Reading controls">
        <div class="seg" aria-label="Font size">
          <button class="seg__btn seg__btn--sm" data-font="sm" aria-label="Smaller text">A</button>
          <button class="seg__btn seg__btn--md is-active" data-font="md" aria-label="Medium text">A</button>
          <button class="seg__btn seg__btn--lg" data-font="lg" aria-label="Larger text">A</button>
          <button class="seg__btn seg__btn--lg" data-font="xl" aria-label="Extra large text" style="font-size:1.12rem;">A</button>
        </div>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <!-- Reading progress bar — only visible in reader view -->
  <div class="progress" aria-hidden="true">
    <div class="progress__fill" id="progress-fill"></div>
  </div>

  <!-- LIBRARY VIEW -->
  <main class="view view--library" id="view-library">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero__inner">
        <div>
          <p class="hero__eyebrow">Internal review · Not for distribution</p>
          <h1 class="hero__title" id="hero-title">The Movemental library.</h1>
          <p class="hero__lede">One place to read and review everything we've drafted — the manuscript chapters and the full set of articles across system, credibility, courses, and platform copy. Your progress is saved locally.</p>
        </div>
        <div class="hero__stats" id="hero-stats"></div>
      </div>
    </section>

    <div id="lib-tabs" class="tabs"></div>
    <div id="lib-content"></div>
  </main>

  <!-- READER VIEW -->
  <main class="view view--reader" id="view-reader">
    <div class="reader-shell">
      <aside class="reader-sidebar" id="reader-sidebar" aria-label="Document navigation"></aside>
      <div class="reader-main" id="reader-main"></div>
      <aside class="reader-rail" id="reader-rail" aria-label="On this page"></aside>
    </div>
  </main>

  <!-- marked.js for Markdown → HTML -->
  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js"></script>
  <script src="./assets/manifest.js"></script>
  <script src="./assets/reader.js"></script>
</body>
</html>
