<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Agent orchestration — local reader</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Document navigation">
        <div class="sidebar-header">
          <h1 class="sidebar-title">Agent orchestration</h1>
          <p class="sidebar-sub">Local reader · not for deploy</p>
        </div>
        <div class="search-wrap">
          <input
            type="search"
            class="search-input"
            id="search"
            placeholder="Filter documents…"
            autocomplete="off"
          />
        </div>
        <nav class="nav-scroll" id="nav" aria-label="Sections"></nav>
      </aside>

      <div class="main">
        <header class="topbar">
          <div class="breadcrumb" id="breadcrumb">Home</div>
          <div class="topbar-actions">
            <button type="button" class="btn" id="btn-copy-markdown" title="Copy this page as markdown" hidden disabled>
              Copy markdown
            </button>
            <button type="button" class="btn" id="btn-copy-link" title="Copy deep link">Copy link</button>
            <button type="button" class="btn" id="btn-refresh" title="Reload manifest">Refresh</button>
            <button type="button" class="btn btn-primary" id="btn-home">Home</button>
          </div>
        </header>
        <article class="content" id="content" aria-live="polite"></article>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
